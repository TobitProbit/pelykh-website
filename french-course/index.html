  title: "French B1 → B2: Pillar Practice",
  pillars: [
    /* ============================================================ */
    /* PILLAR 1 — PRONOUNS                                           */
    /* ============================================================ */
    {
      id: "pronouns",
      title: "Pronouns",
      subtitle: "y · en · lui · leur",
      tagline: "Elevate the natural flow of professional French.",
      intro: `<p>The four pronouns <strong>y</strong>, <strong>en</strong>, <strong>lui</strong> and <strong>leur</strong> are the single biggest fluency multiplier between solid B1 and confident B2. Native speakers use them constantly to avoid repeating nouns, and missing them out makes you sound like a textbook.</p>
        <p>The mistakes are not random — they fall into a small number of patterns. By the end of this pillar you will be able to: <strong>(1)</strong> tell instantly whether a verb takes <em>à</em> or <em>de</em>; <strong>(2)</strong> pick the right pronoun for a thing versus a person; <strong>(3)</strong> place the pronoun correctly in simple, compound, and imperative sentences.</p>`,
      subsections: [
        /* ------- 1.1  y  ------- */
        {
          id: "y",
          title: "y — the « à + thing » pronoun",
          summary: "Replaces a thing or place introduced by à (and a few other prepositions of place).",
          explanation: `
<h3 class="font-serif text-2xl text-navy mb-3">When to use <em>y</em></h3>
<p><strong>Rule:</strong> <em>y</em> stands in for a <strong>thing</strong> or a <strong>place</strong> introduced by <em>à</em> (or sometimes <em>dans</em>, <em>sur</em>, <em>chez</em>, <em>en</em>). It never refers to a person.</p>

<h4 class="font-serif text-xl text-navy mt-6 mb-2">Two main uses</h4>
<div class="space-y-3">
  <div class="rounded-lg bg-paper border border-rule p-4">
    <div class="text-xs uppercase tracking-wider text-mute mb-1">Place</div>
    <div>Je vais <strong>à Paris</strong>. → J'<strong>y</strong> vais.</div>
    <div>Tu travailles <strong>chez Aspeya</strong> ? → Oui, j'<strong>y</strong> travaille.</div>
  </div>
  <div class="rounded-lg bg-paper border border-rule p-4">
    <div class="text-xs uppercase tracking-wider text-mute mb-1">Thing introduced by à</div>
    <div>Je pense <strong>à mon projet</strong>. → J'<strong>y</strong> pense.</div>
    <div>Elle s'intéresse <strong>à la finance</strong>. → Elle s'<strong>y</strong> intéresse.</div>
  </div>
</div>

<h4 class="font-serif text-xl text-navy mt-6 mb-2">Verbs to memorise (à + thing)</h4>
<p class="text-sm text-mute mb-2">These are the verbs you will hit most often in a Swiss professional context:</p>
<div class="grid grid-cols-2 gap-x-6 gap-y-1 text-sm">
  <div>• penser à</div><div>• s'intéresser à</div>
  <div>• réfléchir à</div><div>• s'habituer à</div>
  <div>• songer à</div><div>• se mettre à</div>
  <div>• répondre à <span class="text-mute">(a letter, a question)</span></div><div>• tenir à <span class="text-mute">(to value, insist on)</span></div>
  <div>• participer à</div><div>• jouer à <span class="text-mute">(a sport/game)</span></div>
  <div>• assister à</div><div>• croire à</div>
  <div>• réussir à</div><div>• consentir à</div>
</div>

<h4 class="font-serif text-xl text-navy mt-6 mb-2">Where it sits</h4>
<table class="w-full text-sm border-collapse mt-2">
  <thead><tr class="border-b border-rule"><th class="text-left py-2 pr-2 font-semibold">Tense</th><th class="text-left py-2 font-semibold">Example</th></tr></thead>
  <tbody class="divide-y divide-rule">
    <tr><td class="py-2 pr-2 text-mute">Simple tense</td><td class="py-2">J'<strong>y</strong> pense.</td></tr>
    <tr><td class="py-2 pr-2 text-mute">Compound tense</td><td class="py-2">J'<strong>y</strong> ai pensé toute la nuit.</td></tr>
    <tr><td class="py-2 pr-2 text-mute">Negation</td><td class="py-2">Je n'<strong>y</strong> pense pas.</td></tr>
    <tr><td class="py-2 pr-2 text-mute">Future (with verb-of-motion + infinitive)</td><td class="py-2">Je vais <strong>y</strong> réfléchir.</td></tr>
    <tr><td class="py-2 pr-2 text-mute">Affirmative imperative</td><td class="py-2">Penses-<strong>y</strong> ! <span class="text-mute">(note the -s for euphony)</span></td></tr>
    <tr><td class="py-2 pr-2 text-mute">Negative imperative</td><td class="py-2">N'<strong>y</strong> pense pas.</td></tr>
  </tbody>
</table>

<h4 class="font-serif text-xl text-navy mt-6 mb-2">The trap: people are not « y »</h4>
<div class="rounded-lg bg-red-50 border border-red-200 p-4 text-sm">
  <div>✗ Je pense à Marie. → <s>J'y pense.</s></div>
  <div>✓ Je pense à Marie. → Je pense <strong>à elle</strong>.</div>
  <div class="mt-2">For people after <em>à</em>, use a <strong>stressed pronoun</strong> (à moi, à toi, à lui, à elle, à nous, à vous, à eux, à elles) — except with verbs that take an indirect object pronoun (see 1.3).</div>
</div>
`,
          examples: [
            { fr: "Tu réfléchis à l'offre ? — Oui, j'y réfléchis.", note: "thing → y" },
            { fr: "Elle s'intéresse à la stratégie d'acquisition. → Elle s'y intéresse.", note: "thing → y" },
            { fr: "On va au bureau ce matin. → On y va.", note: "place → y" },
            { fr: "Tu as répondu à son mail ? — Pas encore, j'y répondrai cet après-midi.", note: "thing → y, future" },
            { fr: "Penses-y avant de signer.", note: "imperative + -s for euphony" },
          ],
          exercises: [
            { type: "fill", prompt: "Tu participes à la réunion de 14h ? — Oui, j'___ participe.", answer: "y", hint: "« à + une réunion » → which pronoun?" },
            { type: "fill", prompt: "Nous réfléchissons à votre proposition. → Nous ___ réfléchissons.", answer: "y" },
            { type: "fill", prompt: "Elle tient à son indépendance. → Elle ___ tient.", answer: "y" },
            { type: "mcq", prompt: "« Il s'intéresse à cette nouvelle marque. »  Replace correctly:", choices: ["Il s'en intéresse.", "Il s'y intéresse.", "Il lui intéresse.", "Il l'intéresse."], answer: 1, hint: "s'intéresser takes à; the object is a thing." },
            { type: "fill", prompt: "Vous croyez à l'innovation ? — Oui, j'___ crois fermement.", answer: "y" },
            { type: "mcq", prompt: "Which sentence is correct?", choices: ["Je y pense.", "J'y pense.", "Je lui pense.", "Je pense y."], answer: 1, hint: "Elision: « je » + « y » = « j'y »." },
            { type: "fill", prompt: "Si tu vas à Genève demain, j'___ vais avec toi.", answer: "y" },
            { type: "transform", prompt: "Transform: « Il s'habitue à sa nouvelle équipe. »", answer: "Il s'y habitue.", hint: "Replace « à sa nouvelle équipe » with y." },
            { type: "fill", prompt: "Affirmative imperative — encourage your colleague to think about it: ___-y !", answer: "Penses", hint: "tu form of penser + « s » for euphony before y." },
            { type: "mcq", prompt: "« Elle pense à son fiancé. »  Replace correctly:", choices: ["Elle y pense.", "Elle pense à lui.", "Elle en pense.", "Elle lui pense."], answer: 1, hint: "Person, not thing." },
            { type: "fill", prompt: "Tu joues au tennis ? — Oui, j'___ joue tous les samedis.", answer: "y" },
            { type: "transform", prompt: "Rewrite using y: « Nous assisterons à la conférence. »", answer: "Nous y assisterons.", hint: "y goes before the verb." },
            { type: "fill", prompt: "Past tense: « As-tu pensé à ton entretien ? » — « Oui, j'___ ai pensé tout le week-end. »", answer: "y" },
            { type: "mcq", prompt: "Negative imperative: « Don't think about it (your old job). »", choices: ["N'y pense pas.", "Ne pense pas y.", "Ne y pense pas.", "Penses-en pas."], answer: 0, hint: "Negation wraps around « y + verb »." },
            { type: "fill", prompt: "Je me suis enfin habitué au climat suisse. → Je m'___ suis enfin habitué.", answer: "y", hint: "s'habituer à + thing." },
            { type: "transform", prompt: "Transform: « Il a réussi à son examen. »", answer: "Il y a réussi.", hint: "y goes before the auxiliary." },
          ],
          quiz: [
            { type: "fill", prompt: "« Tu réfléchis à ma proposition ? » — « Oui, j'___ réfléchis. »", answer: "y" },
            { type: "mcq", prompt: "Replace correctly: « Elle s'intéresse à cette acquisition. »", choices: ["Elle s'en intéresse.", "Elle s'y intéresse.", "Elle l'intéresse.", "Elle lui intéresse."], answer: 1 },
            { type: "fill", prompt: "« Je tiens à mon avis. » → J'___ tiens.", answer: "y" },
            { type: "mcq", prompt: "« Il pense à sa femme. »  Correct replacement:", choices: ["Il y pense.", "Il pense à elle.", "Il en pense.", "Il lui pense."], answer: 1 },
            { type: "transform", prompt: "Rewrite using y: « Vous croyez à cette stratégie. »", answer: "Vous y croyez." },
            { type: "fill", prompt: "Imperative — push a teammate to think about it: « ___-y avant la réunion ! » (tu form, « penser »)", answer: "Penses" },
            { type: "fill", prompt: "Past compound: « Nous ___ avons participé hier. » (à la conférence)", answer: "y" },
          ],
        },

        /* ------- 1.2  en  ------- */
        {
          id: "en",
          title: "en — the « de + thing » pronoun",
          summary: "Replaces things introduced by de, partitive articles, and quantities.",
          explanation: `
<h3 class="font-serif text-2xl text-navy mb-3">When to use <em>en</em></h3>
<p><em>en</em> covers three jobs at once: <strong>(a)</strong> things introduced by <em>de</em>, <strong>(b)</strong> partitive articles (du, de la, des), and <strong>(c)</strong> quantities and numbers.</p>

<h4 class="font-serif text-xl text-navy mt-6 mb-2">Three jobs</h4>
<div class="space-y-3">
  <div class="rounded-lg bg-paper border border-rule p-4">
    <div class="text-xs uppercase tracking-wider text-mute mb-1">de + thing</div>
    <div>Nous discutons <strong>de la stratégie</strong>. → Nous <strong>en</strong> discutons.</div>
    <div>Tu as besoin <strong>d'aide</strong> ? → Tu <strong>en</strong> as besoin ?</div>
  </div>
  <div class="rounded-lg bg-paper border border-rule p-4">
    <div class="text-xs uppercase tracking-wider text-mute mb-1">Partitive (du / de la / des)</div>
    <div>Tu veux <strong>du café</strong> ? → Tu <strong>en</strong> veux ?</div>
    <div>Il achète <strong>des fruits</strong>. → Il <strong>en</strong> achète.</div>
  </div>
  <div class="rounded-lg bg-paper border border-rule p-4">
    <div class="text-xs uppercase tracking-wider text-mute mb-1">Quantity — the number/quantity stays at the end</div>
    <div>J'ai <strong>trois</strong> enfants. → J'<strong>en</strong> ai <strong>trois</strong>.</div>
    <div>Il a <strong>beaucoup d'</strong>amis. → Il <strong>en</strong> a <strong>beaucoup</strong>.</div>
    <div>Combien de cafés par jour ? — J'<strong>en</strong> bois <strong>deux</strong>.</div>
  </div>
</div>

<h4 class="font-serif text-xl text-navy mt-6 mb-2">Verbs to memorise (de + thing)</h4>
<div class="grid grid-cols-2 gap-x-6 gap-y-1 text-sm">
  <div>• parler de</div><div>• avoir besoin de</div>
  <div>• discuter de</div><div>• avoir envie de</div>
  <div>• se souvenir de</div><div>• avoir peur de</div>
  <div>• se rappeler de</div><div>• s'occuper de</div>
  <div>• être responsable de</div><div>• profiter de</div>
  <div>• décider de</div><div>• se servir de <span class="text-mute">(use)</span></div>
  <div>• se moquer de</div><div>• se plaindre de</div>
  <div>• rêver de</div><div>• s'agir de</div>
</div>

<h4 class="font-serif text-xl text-navy mt-6 mb-2">The trap: people with <em>de</em></h4>
<div class="rounded-lg bg-red-50 border border-red-200 p-4 text-sm">
  <div>For verbs of <strong>emotion</strong> (parler de, se souvenir de, se moquer de) referring to a <em>person</em>, prefer <strong>de + stressed pronoun</strong>:</div>
  <div class="mt-2">• Je parle de mon frère → Je parle <strong>de lui</strong>. <span class="text-mute">(not « j'en parle »)</span></div>
  <div>• Elle se souvient de toi.</div>
  <div class="mt-2">For <em>en</em> with a person is OK only when the person is treated impersonally (« il en a beaucoup » = « he has many [staff] »).</div>
</div>

<h4 class="font-serif text-xl text-navy mt-6 mb-2">Position</h4>
<table class="w-full text-sm border-collapse mt-2">
  <tbody class="divide-y divide-rule">
    <tr><td class="py-2 pr-2 text-mute">Simple</td><td class="py-2">J'<strong>en</strong> veux.</td></tr>
    <tr><td class="py-2 pr-2 text-mute">Compound</td><td class="py-2">J'<strong>en</strong> ai pris.</td></tr>
    <tr><td class="py-2 pr-2 text-mute">Negation</td><td class="py-2">Je n'<strong>en</strong> veux pas.</td></tr>
    <tr><td class="py-2 pr-2 text-mute">Quantity</td><td class="py-2">J'<strong>en</strong> ai trois. / Il <strong>en</strong> a beaucoup.</td></tr>
    <tr><td class="py-2 pr-2 text-mute">Imperative +</td><td class="py-2">Prends-<strong>en</strong> ! <span class="text-mute">(« s » added to tu form)</span></td></tr>
    <tr><td class="py-2 pr-2 text-mute">Imperative −</td><td class="py-2">N'<strong>en</strong> prends pas.</td></tr>
  </tbody>
</table>
`,
          examples: [
            { fr: "Nous discutons de la fusion. → Nous en discutons.", note: "parler/discuter de + thing" },

            { type: "fill", prompt: "Il se sert de ce logiciel chaque jour. → Il s'___ sert chaque jour.", answer: "en" },

          quiz: [
            { type: "fill", prompt: "« Nous avons discuté de la stratégie. » → Nous ___ avons discuté.", answer: "en" },

            { type: "fill", prompt: "Je n'ai pas envie d'y aller. → Je n'___ ai pas envie.", answer: "en" },

        {

<h4 class="font-serif text-xl text-navy mt-6 mb-2">Type 1 — Si + présent</h4>
<div class="rounded-lg bg-paper border border-rule p-4 text-sm">
  <p>Use when the condition is realistic — present habit, possible future event, or an instruction:</p>
  <ul class="mt-2 space-y-1">
    <li>• Si tu <strong>viens</strong> à la réunion, <strong>prends</strong> ton ordinateur. <span class="text-mute">(impératif)</span></li>
    <li>• Si les taux <strong>baissent</strong>, nous <strong>pourrons</strong> augmenter le capital. <span class="text-mute">(futur — your Q8)</span></li>
    <li>• Si je <strong>finis</strong> tôt, je <strong>passe</strong> chez toi. <span class="text-mute">(présent — habit / planned)</span></li>
  </ul>
</div>

<h4 class="font-serif text-xl text-navy mt-6 mb-2">Type 2 — Si + imparfait</h4>
<div class="rounded-lg bg-paper border border-rule p-4 text-sm">
  <p>The hypothetical present / near future — the condition is not the case <em>now</em>, but you imagine it. English equivalent: « if I had / were … I would … ».</p>
  <ul class="mt-2 space-y-1">
    <li>• Si j'<strong>avais</strong> plus de temps, je <strong>voyagerais</strong>. <span class="text-mute">(I don't have time → I won't travel)</span></li>
    <li>• Si nous <strong>étions</strong> plus nombreux, nous <strong>pourrions</strong> ouvrir un second bureau.</li>
    <li>• Si tu <strong>connaissais</strong> le marché allemand, ce serait plus facile.</li>
  </ul>
</div>

<h4 class="font-serif text-xl text-navy mt-6 mb-2">Type 3 — Si + plus-que-parfait</h4>
<div class="rounded-lg bg-paper border border-rule p-4 text-sm">
  <p>The counterfactual past. The condition is over — it didn't happen — and we imagine an alternative outcome that didn't happen either. Classic retrospective / strategy-meeting / regret structure:</p>
  <ul class="mt-2 space-y-1">
    <li>• Si nous <strong>avions su</strong>, nous <strong>aurions investi</strong>. <span class="text-mute">(We didn't know → we didn't invest)</span></li>
    <li>• Si la valorisation <strong>avait été</strong> plus basse, nous <strong>aurions conclu</strong> plus vite. <span class="text-mute">(your Q9)</span></li>
    <li>• Si tu m'<strong>avais prévenu</strong>, je <strong>serais venu</strong>.</li>
  </ul>
</div>

<h4 class="font-serif text-xl text-navy mt-6 mb-2">Mixed: past condition → present consequence</h4>

    <li>✗ a past conditional (Si tu m'<s>aurais</s> écouté…)</li>
  </ul>
  <p class="mt-2">Si clause sticks to <strong>présent · imparfait · plus-que-parfait</strong>. Conditionals and futures live only in the <em>main</em> clause.</p>

function el(tag, props={}, children=[]) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(props)) {
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  }
  for (const c of (Array.isArray(children) ? children : [children])) {
    if (c == null) continue;
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
}

function renderNav(target) {
  target.innerHTML = '';
  COURSE.pillars.forEach((p, pi) => {
    const head = el('div', { class:'px-4 pt-4 pb-1 text-[10px] uppercase tracking-widest text-gold/80' }, `Pillar ${pi+1}`);
    target.appendChild(head);
    p.subsections.forEach((s, si) => {
      const r = STATE.results[p.id]?.[s.id];
      const dot = el('span', { class:'progress-dot ' + (r && r.score === r.total ? 'bg-green-400' : r ? 'bg-yellow-400' : 'bg-white/20'), title: r ? `${r.score}/${r.total}` : 'not done' });
      const navTitle = el('div', { class:'flex-1 min-w-0' }, [
        el('div', { class:'text-sm font-medium truncate', title: s.title }, `${pi+1}.${si+1} ${s.title.split('—')[0].trim()}`),
        el('div', { class:'nav-sub text-[11px] text-white/40 truncate' }, s.summary || ''),
      ]);
      const item = el('button', {
        class: 'nav-item w-full text-left px-4 py-2.5 hover:bg-white/5 flex items-start gap-3',
        onclick: () => navigate(p.id, s.id),
      }, [dot, navTitle]);
      item.dataset.path = p.id + '/' + s.id;
      target.appendChild(item);
    });
    // section quiz item
    const r = STATE.results[p.id]?.section;
    const dot = el('span', { class:'progress-dot ' + (r && r.score / r.total >= 0.8 ? 'bg-green-400' : r ? 'bg-yellow-400' : 'bg-white/20') });
    const sec = el('button', {
      class: 'nav-item w-full text-left px-4 py-2.5 hover:bg-white/5 flex items-start gap-3 text-accent',
      onclick: () => navigate(p.id, null, true),
    }, [dot, el('div', { class:'flex-1 min-w-0' }, [
      el('div', { class:'text-sm font-semibold' }, `★ Section Quiz`),
      el('div', { class:'nav-sub text-[11px] text-white/40' }, p.title),
    ])]);
    sec.dataset.path = p.id + '/__section__';
    target.appendChild(sec);
  });
  // home
  const home = el('button', {
    class:'nav-item w-full text-left px-4 py-2.5 hover:bg-white/5 flex items-start gap-3 mt-4 border-t border-white/10',
    onclick: () => navigateHome(),
  }, [el('span', { class:'progress-dot bg-white/30' }), el('div', { class:'flex-1' }, [el('div', { class:'text-sm' }, '← Home')])]);
  home.dataset.path = '__home__';
  target.appendChild(home);

  // mark active
  const path = STATE.current?.view === 'home' ? '__home__' :
               STATE.current?.view === 'section' ? STATE.current.pillarId + '/__section__' :
               STATE.current ? STATE.current.pillarId + '/' + STATE.current.subId : '';
  target.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.path === path);
  });
}

function navigate(pillarId, subId, isSection) {
  STATE.current = isSection ? { pillarId, view: 'section' } : { pillarId, subId };
  render();
  window.scrollTo({ top: 0, behavior: 'instant' });
  closeMobileDrawer();
}

function navigateHome() {
  STATE.current = { view: 'home' };
  render();
  closeMobileDrawer();
}

function closeMobileDrawer() {
  document.getElementById('m-drawer').classList.add('hidden');
}

    el('button', { class:'hover:text-navy', onclick: () => navigateHome() }, 'Home'),
    el('span', {}, ' / '),
    el('span', {}, `Pillar: ${pillar.title}`),
    el('span', {}, ' / '),
    el('span', { class:'text-navy font-semibold' }, 'Section Quiz'),
  ]));

  view.appendChild(el('h1', { class:'font-serif text-4xl text-ink' }, `${pillar.title} — Section Quiz`));
  view.appendChild(el('p', { class:'text-mute mt-2 mb-7' }, pillar.tagline));

  if (!pillar.sectionQuiz?.length) {
    view.appendChild(el('div', { class:'rounded-xl bg-paper border border-rule p-6 text-sm text-mute' }, 'Section quiz will appear once this pillar is fully built out.'));
    return;
  }
  view.appendChild(el('div', { class:'mt-2 p-6 rounded-2xl bg-ink text-cream' }, [
    el('div', { class:'flex items-center justify-between mb-4' }, [
      el('h3', { class:'font-serif text-3xl' }, 'Section Quiz'),
      el('div', { class:'text-xs uppercase tracking-widest text-gold' }, `${pillar.sectionQuiz.length} questions`),
    ]),
    renderQuiz(pillar, { id:'section', title: pillar.title, quiz: pillar.sectionQuiz }, true),
  ]));
}

/* ---------- exercise card ---------- */

function normalizeAns(s) {
  return s.toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g, '')   // strip combining diacritics for forgiving compare
    .replace(/[!?.,;:'’«»"\-]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function isCorrect(userAns, correct) {
  if (Array.isArray(correct)) return correct.some(c => normalizeAns(userAns) === normalizeAns(c));
  return normalizeAns(userAns) === normalizeAns(correct);
}

const SPECIAL_CHARS = ['à','â','ç','è','é','ê','ë','î','ï','ô','ù','û','ü','œ'];

function renderExerciseCard(q, key, asQuiz) {
  const card = el('div', { class:'ex-card rounded-xl border border-rule bg-white p-4', 'data-key':key });
  const prompt = el('div', { class:'mb-2 leading-relaxed', html: q.prompt });
  card.appendChild(prompt);
  let result = null;

  if (q.type === 'mcq') {
    const choices = el('div', { class:'flex flex-col gap-2 mt-1' });
    q.choices.forEach((c, i) => {
      const b = el('button', { class:'mcq-btn text-left px-3 py-2 border border-rule rounded-lg', onclick: () => choose(i) }, c);
      choices.appendChild(b);
    });
    card.appendChild(choices);
    function choose(i) {
      [...choices.children].forEach((b, bi) => {
        b.disabled = true;
        if (bi === i) b.classList.add('selected');
      });
      const correct = i === q.answer;
      [...choices.children].forEach((b, bi) => {
        if (bi === q.answer) b.classList.add('correct');
        else if (bi === i) b.classList.add('wrong');
      });
      card.classList.add(correct ? 'correct' : 'wrong');
      const fb = renderFeedback(correct, q, q.choices[q.answer]);
      card.appendChild(fb);
      result = { key, q, userAns: q.choices[i], correct };
      card._result = result;
      // notify quiz tracker if part of quiz
      card.dispatchEvent(new CustomEvent('answered', { detail: result, bubbles: true }));
    }
  } else if (q.type === 'fill' || q.type === 'transform') {
    const input = el('input', { type:'text', class:'ex-input w-full px-3 py-2 border border-rule rounded-lg bg-white font-mono', placeholder:'Type your answer…', autocomplete:'off', spellcheck:'false' });
    const kb = el('div', { class:'keyboard' });
    SPECIAL_CHARS.forEach(ch => {
      kb.appendChild(el('button', { type:'button', onclick: () => { insertAtCursor(input, ch); input.focus(); } }, ch));
    });
    card.appendChild(input);
    card.appendChild(kb);
    const row = el('div', { class:'mt-2 flex gap-2' }, [
      el('button', { class:'px-3 py-1.5 bg-navy text-white rounded-md text-sm', onclick: check }, 'Check'),
      q.hint ? el('button', { class:'px-3 py-1.5 border border-rule rounded-md text-sm', onclick: showHint }, 'Hint') : null,
    ]);
    card.appendChild(row);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); check(); } });
    function showHint() {
      if (card.querySelector('.hint-line')) return;
      card.appendChild(el('div', { class:'hint-line mt-2 text-sm text-mute italic' }, '💡 ' + q.hint));
    }
    function check() {
      if (card._result) return;
      const u = input.value;
      const correct = isCorrect(u, q.answer);
      input.disabled = true;
      [...row.children].forEach(c => c && (c.disabled = true));
      card.classList.add(correct ? 'correct' : 'wrong');
      const fb = renderFeedback(correct, q, q.answer);
      card.appendChild(fb);
      result = { key, q, userAns: u, correct };
      card._result = result;
      card.dispatchEvent(new CustomEvent('answered', { detail: result, bubbles: true }));
    }
  }
  return card;
}

function renderFeedback(correct, q, expectedDisplay) {
  if (correct) {
    return el('div', { class:'mt-2 text-sm text-green-700 font-medium' }, '✓ Correct.');
  }
  return el('div', { class:'mt-2 text-sm text-red-700' }, [
    el('div', { class:'font-semibold' }, '✗ Not quite.'),
    el('div', {}, [
      el('span', { class:'text-red-700/70' }, 'Expected: '),
      el('span', { class:'font-mono font-semibold' }, Array.isArray(expectedDisplay) ? expectedDisplay[0] : expectedDisplay),
    ]),
    q.hint ? el('div', { class:'mt-1 text-mute italic' }, '💡 ' + q.hint) : null,
  ]);
}

function insertAtCursor(input, ch) {
  const s = input.selectionStart, e = input.selectionEnd;
  input.value = input.value.slice(0,s) + ch + input.value.slice(e);
  input.selectionStart = input.selectionEnd = s + ch.length;
}

/* ---------- quiz block ---------- */

function renderQuiz(pillar, sub, isSection) {
  const wrap = el('div', { class:'space-y-3' });
  const items = [];
  sub.quiz.forEach((q, i) => {
    const card = renderExerciseCard(q, (sub.id === 'section' ? 'section' : sub.id) + '/quiz/' + i, true);
    card.classList.replace('bg-white','bg-cream');
    card.classList.replace('border-rule','border-cream/30');
    wrap.appendChild(card);
    items.push({ card, q });
  });
  const finishBtn = el('button', { class:'mt-2 px-4 py-2.5 rounded-lg bg-accent text-white font-semibold disabled:opacity-50', disabled:'true', onclick: finalize }, 'Finish & see results');
  const status = el('div', { class:'text-sm text-cream/70 mt-3' }, `0 / ${sub.quiz.length} answered`);
  const reportContainer = el('div', { class:'mt-5' });

  let answered = 0;
  wrap.addEventListener('answered', () => {
    answered = items.filter(it => it.card._result).length;
    status.textContent = `${answered} / ${sub.quiz.length} answered`;
    if (answered === sub.quiz.length) finishBtn.removeAttribute('disabled');
  });

  function finalize() {
    finishBtn.disabled = true;
    const results = items.map(it => it.card._result);
    const score = results.filter(r => r.correct).length;
    const total = results.length;
    // store
    if (!STATE.results[pillar.id]) STATE.results[pillar.id] = {};
    STATE.results[pillar.id][isSection ? 'section' : sub.id] = { score, total, items: results, ts: new Date().toISOString() };
    renderNav(document.getElementById('nav'));
    renderNav(document.getElementById('m-nav'));
    updateOverall();
    reportContainer.innerHTML = '';
    reportContainer.appendChild(buildReportBlock(pillar, sub, score, total, results, isSection));
  }

  const container = el('div', {}, [wrap, el('div', { class:'flex items-center justify-between' }, [status, finishBtn]), reportContainer]);
  return container;
}

function buildReportBlock(pillar, sub, score, total, items, isSection) {
  const pct = Math.round(score/total*100);
  const wrong = items.filter(r => !r.correct);
  const summary = el('div', { class:'rounded-xl bg-cream text-ink p-5' });
  summary.appendChild(el('div', { class:'flex items-center justify-between' }, [
    el('div', {}, [
      el('div', { class:'text-xs uppercase tracking-widest text-mute' }, 'Result'),
      el('div', { class:'font-serif text-4xl' }, `${score} / ${total}`),
      el('div', { class:'text-sm text-mute mt-1' }, pct >= 80 ? '★ Strong. Move on.' : pct >= 60 ? 'Solid. A bit more practice.' : 'Worth a re-run after iteration.'),
    ]),
    el('div', { class:'text-right' }, [
      el('div', { class:'text-3xl font-bold ' + (pct >= 80 ? 'text-green-600' : pct >= 60 ? 'text-yellow-600' : 'text-accent')}, `${pct}%`),
    ]),
  ]));

  // text report for copy
  const reportText = formatReport(pillar, sub, score, total, items, isSection);
  const ta = el('textarea', { class:'mt-4 w-full font-mono text-xs p-3 border border-rule rounded-lg bg-white', rows:Math.min(12, 6+wrong.length) }, '');
  ta.value = reportText;

  const copyBtn = el('button', { class:'mt-3 px-4 py-2 bg-navy text-white rounded-lg text-sm font-semibold', onclick: copy }, 'Copy results to clipboard');
  const copyMsg = el('span', { class:'ml-3 text-sm text-green-700 hidden' }, '✓ Copied. Paste it back to Claude.');
  async function copy() {
    try {
      await navigator.clipboard.writeText(ta.value);
      copyMsg.classList.remove('hidden');
      setTimeout(() => copyMsg.classList.add('hidden'), 3000);
    } catch(err) {
      ta.select();
      document.execCommand('copy');
      copyMsg.classList.remove('hidden');
    }
  }
  summary.appendChild(el('div', { class:'mt-4 text-sm text-mute' }, 'Paste this report back to Claude — I will spin up extra drill subsections aimed at exactly the gaps below.'));
  summary.appendChild(ta);
  summary.appendChild(el('div', { class:'mt-2 flex items-center' }, [copyBtn, copyMsg]));
  return summary;
}

function formatReport(pillar, sub, score, total, items, isSection) {
  const lines = [];
  lines.push('=== FRENCH PILLAR PRACTICE — QUIZ REPORT ===');
  lines.push(`Date: ${new Date().toISOString().slice(0,16).replace('T',' ')}`);
  lines.push(`Pillar: ${pillar.title} (${pillar.id})`);
  lines.push(`Quiz: ${isSection ? 'Section quiz' : 'Subsection — ' + sub.title}`);
  lines.push(`Score: ${score}/${total}  (${Math.round(score/total*100)}%)`);
  lines.push('');
  lines.push('--- DETAIL ---');
  items.forEach((r, i) => {
    const mark = r.correct ? '✓' : '✗';
    const expected = Array.isArray(r.q.answer) ? r.q.answer[0] : (r.q.choices ? r.q.choices[r.q.answer] : r.q.answer);
    lines.push(`Q${i+1} ${mark}  ${stripHtml(r.q.prompt).slice(0,180)}`);
    lines.push(`    Your answer: ${r.userAns}`);
    if (!r.correct) lines.push(`    Expected:    ${expected}`);
  });
  const wrong = items.filter(r => !r.correct);
  if (wrong.length) {
    lines.push('');
    lines.push('--- WEAK AREAS (auto-detected) ---');
    const tags = {};
    wrong.forEach(r => {
      const p = stripHtml(r.q.prompt).toLowerCase();
      if (/\by\b|à\s|penser|s'intéresser|tenir|réfléchir|participer/.test(p)) tags['y (à + thing)'] = (tags['y (à + thing)']||0)+1;
      if (/\ben\b|de\b|parler de|besoin|discuter|souvenir|s'occuper/.test(p)) tags['en (de + thing / quantity)'] = (tags['en (de + thing / quantity)']||0)+1;
      if (/lui|leur|téléphoner|parler à|écrire à|envoyer/.test(p)) tags['lui/leur (indirect)'] = (tags['lui/leur (indirect)']||0)+1;
      if (/imperative|imperative|donne-|vas-y|prends-en|!/.test(p)) tags['imperative + pronoun'] = (tags['imperative + pronoun']||0)+1;
      if (/order|both|two pronouns|combining/.test(p) || /lui en|le lui|les leur/.test(stripHtml(r.q.prompt + ' ' + (r.q.choices||[]).join(' ')).toLowerCase())) tags['pronoun order'] = (tags['pronoun order']||0)+1;
    });
    Object.entries(tags).forEach(([k,v]) => lines.push(`  • ${k}: ${v} miss${v>1?'es':''}`));
  }
  lines.push('');
  lines.push('=== END ===');
  return lines.join('\n');
}

function stripHtml(s) {
  return (s || '').replace(/<[^>]+>/g, '').replace(/\s+/g,' ').trim();
}

/* ---------- aggregate ---------- */

function pillarOverallScore(p) {
  let score=0, total=0;
  for (const s of p.subsections) {
    const r = STATE.results[p.id]?.[s.id];
    if (r) { score += r.score; total += r.total; }
  }
  const sec = STATE.results[p.id]?.section;
  if (sec) { score += sec.score; total += sec.total; }
  return { score, total };
}

function updateOverall() {
  let score=0, total=0;
  for (const p of COURSE.pillars) {
    const s = pillarOverallScore(p);
    score += s.score; total += s.total;
  }
  const el1 = document.getElementById('overall-progress');
  const el2 = document.getElementById('overall-bar');
  if (total > 0) {
    el1.textContent = `${score}/${total}`;
    el2.style.width = (score/total*100) + '%';
  } else {
    el1.textContent = '—';
    el2.style.width = '0%';
  }
}

/* ---------- main render ---------- */

function render() {
  if (!STATE.current || STATE.current.view === 'home') {
    viewHome();
  } else if (STATE.current.view === 'section') {
    const p = COURSE.pillars.find(x => x.id === STATE.current.pillarId);
    viewSectionQuiz(p);
  } else {
    const p = COURSE.pillars.find(x => x.id === STATE.current.pillarId);
    const s = p.subsections.find(x => x.id === STATE.current.subId);
    viewSubsection(p, s);
  }
  renderNav(document.getElementById('nav'));
  renderNav(document.getElementById('m-nav'));
  updateOverall();
}

/* ---------- init ---------- */

document.getElementById('m-menu').addEventListener('click', () => {
  document.getElementById('m-drawer').classList.remove('hidden');
});

navigateHome();
</script>
